name: Lotto AI Predictor

on:
  schedule:
    - cron: '0 14 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug repo
        run: ls -R

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas scikit-learn requests beautifulsoup4 numpy

      - name: Run AI Script
        run: python your_script.py

      - name: Check output
        run: cat result.json || echo "result.json not found"

      - name: Commit and Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add result.json || echo "no file"
          git commit -m "Update prediction" || echo "No changes"
          git push
