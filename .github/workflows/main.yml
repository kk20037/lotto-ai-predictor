name: Lotto AI Predictor

on:
  schedule:
    - cron: '0 14 * * 2,5' # 每週二、五晚上 10 點 (UTC 14:00)
  workflow_dispatch: # 讓你可以手動點擊執行測試

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予寫入權限，這非常重要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升級版本

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級版本
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn requests beautifulsoup4 numpy pytz

      - name: Run AI Script
        run: python your_script.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          # 檢查是否有檔案變更，避免 git commit 出錯導致 exit code 1
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update lotto prediction: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
