name: Lotto AI Predictor

on:
  schedule:
    - cron: '0 14 * * 2,5' # 每週二、五晚上 10 點
  workflow_dispatch: # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 更新到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 更新到 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn requests beautifulsoup4 numpy

      - name: Run AI Script
        run: python your_script.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          # 檢查是否有變更，避免無意義的 Commit 導致錯誤
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update lotto prediction: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
