name: Lotto AI Predictor

on:
  push:
    branches:
      - main      # 只要 main 分支有更新就執行
  schedule:
    - cron: '0 14 * * 2,5' # 台灣時間每週二、五 22:00
  workflow_dispatch:      # 保留手動觸發按鈕

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 確保所有 AI 與爬蟲需要的套件都安裝
          pip install pandas scikit-learn requests beautifulsoup4 numpy pytz lxml

      - name: Run AI Script
        env:
          TZ: "Asia/Taipei"
        run: python your_script.py

      - name: Show result
        run: |
          if [ -f result.json ]; then
            cat result.json
          else
            echo "Error: result.json not found!"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          # 只有在 result.json 有變動時才 commit，避免報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update lotto prediction: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
