name: Lotto AI Predictor

on:
  schedule:
    - cron: '0 14 * * 2,5'   # 每週二、五台灣時間 22:00
  workflow_dispatch:          # 手動觸發測試

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 補上 lxml 與 pytz，確保 CSV 與時區功能正常
          pip install pandas scikit-learn requests beautifulsoup4 numpy pytz lxml

      - name: Run AI Script
        env:
          TZ: "Asia/Taipei" # 設定系統時區
        run: python your_script.py

      - name: Show result
        run: |
          if [ -f result.json ]; then
            cat result.json
          else
            echo "Error: result.json not found!"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          # 避免因為檔案內容完全沒變動而導致 commit 失敗報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update lotto prediction: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
