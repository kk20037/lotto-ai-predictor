name: Lotto AI Predictor

on:
  schedule:
    - cron: '0 14 * * 2,5'   # 每週二、五台灣時間 22:00
  workflow_dispatch:           # 手動觸發測試

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ✅ 已是最新版

      - name: Set up Python
        uses: actions/setup-python@v5   # ✅ 已是最新版
        with:
          python-version: '3.11'       # 升到 3.11 更穩定

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn requests beautifulsoup4 numpy pytz lxml

      - name: Run AI Script
        run: python your_script.py

      - name: Show result
        run: cat result.json          # 除錯用：印出結果

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update lotto prediction: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
