name: Lotto AI Predictor

on:
  schedule:
    - cron: '0 14 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas scikit-learn requests beautifulsoup4 numpy

      - name: Run AI Script
        run: python your_script.py

      - name: Commit and Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add result.json
          git commit -m "Update prediction" || echo "No changes"
          git push
